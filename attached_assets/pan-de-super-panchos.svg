<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo del pan más grande para super pancho -->
  <rect x="100" y="180" width="600" height="240" rx="120" ry="120" fill="#e8c088" />
  
  <!-- Sombra lateral -->
  <rect x="100" y="180" width="600" height="30" rx="15" ry="15" fill="#d4a76a" />
  
  <!-- Superficie del pan (parte superior) -->
  <ellipse cx="400" cy="180" rx="300" ry="40" fill="#f0d6a7" />
  
  <!-- Superficie del pan (parte inferior) -->
  <ellipse cx="400" cy="420" rx="300" ry="40" fill="#d4a76a" />
  
  <!-- Detalles y textura del pan -->
  <ellipse cx="200" cy="250" rx="25" ry="6" fill="#d4a76a" />
  <ellipse cx="320" cy="280" rx="25" ry="6" fill="#d4a76a" />
  <ellipse cx="450" cy="260" rx="25" ry="6" fill="#d4a76a" />
  <ellipse cx="580" cy="290" rx="25" ry="6" fill="#d4a76a" />
  
  <ellipse cx="250" cy="330" rx="25" ry="6" fill="#d4a76a" />
  <ellipse cx="400" cy="320" rx="25" ry="6" fill="#d4a76a" />
  <ellipse cx="550" cy="340" rx="25" ry="6" fill="#d4a76a" />
  
  <!-- Marca de "premium" en el pan -->
  <ellipse cx="400" cy="270" rx="60" ry="20" fill="#e0b980" />
  <text x="400" y="275" font-family="Arial" font-size="16" text-anchor="middle" fill="#8a6d3b">Premium</text>
  
  <!-- Migajas de pan en la parte superior -->
  <circle cx="230" cy="175" r="3" fill="#d4a76a" />
  <circle cx="290" cy="170" r="2" fill="#d4a76a" />
  <circle cx="350" cy="172" r="3" fill="#d4a76a" />
  <circle cx="420" cy="168" r="2" fill="#d4a76a" />
  <circle cx="480" cy="173" r="3" fill="#d4a76a" />
  <circle cx="540" cy="170" r="2" fill="#d4a76a" />
  <circle cx="600" cy="174" r="3" fill="#d4a76a" />
</svg>