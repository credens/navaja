<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo del pan -->
  <rect x="150" y="200" width="500" height="200" rx="100" ry="100" fill="#e8c088" />
  
  <!-- Sombra lateral -->
  <rect x="150" y="200" width="500" height="30" rx="15" ry="15" fill="#d4a76a" />
  
  <!-- Superficie del pan (parte superior) -->
  <ellipse cx="400" cy="200" rx="250" ry="40" fill="#f0d6a7" />
  
  <!-- Superficie del pan (parte inferior) -->
  <ellipse cx="400" cy="400" rx="250" ry="40" fill="#d4a76a" />
  
  <!-- Detalles y textura del pan -->
  <ellipse cx="250" cy="270" rx="20" ry="5" fill="#d4a76a" />
  <ellipse cx="350" cy="280" rx="20" ry="5" fill="#d4a76a" />
  <ellipse cx="450" cy="260" rx="20" ry="5" fill="#d4a76a" />
  <ellipse cx="550" cy="290" rx="20" ry="5" fill="#d4a76a" />
  
  <ellipse cx="300" cy="330" rx="20" ry="5" fill="#d4a76a" />
  <ellipse cx="400" cy="320" rx="20" ry="5" fill="#d4a76a" />
  <ellipse cx="500" cy="340" rx="20" ry="5" fill="#d4a76a" />
  
  <!-- Migajas de pan en la parte superior -->
  <circle cx="280" cy="195" r="3" fill="#d4a76a" />
  <circle cx="320" cy="190" r="2" fill="#d4a76a" />
  <circle cx="380" cy="192" r="3" fill="#d4a76a" />
  <circle cx="420" cy="188" r="2" fill="#d4a76a" />
  <circle cx="460" cy="193" r="3" fill="#d4a76a" />
  <circle cx="500" cy="190" r="2" fill="#d4a76a" />
</svg>